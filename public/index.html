<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESC/POS HEX Text Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }

    .input-panel {
      flex: 1;
      min-width: 400px;
    }

    .preview-panel {
      flex: 1;
      min-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 6px;
      resize: vertical;
      background-color: #fafafa;
    }

    textarea:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      margin-top: 15px;
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #3a7bc8;
    }

    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #previewImage {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .loading {
      color: #666;
      padding: 40px;
      text-align: center;
    }

    .error {
      color: #e74c3c;
      margin-top: 10px;
      padding: 10px;
      background-color: #ffebee;
      border-radius: 4px;
    }

    .info {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .controls button {
      flex: 1;
      padding: 8px 12px;
      font-size: 14px;
    }

    .clear-btn {
      background-color: #f0f0f0;
      color: #666;
    }

    .clear-btn:hover {
      background-color: #e0e0e0;
    }

    .paper-select {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .paper-select label {
      font-size: 14px;
      color: #666;
    }

    .paper-select select {
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 6px;
      background-color: white;
      cursor: pointer;
    }

    .paper-select select:focus {
      outline: none;
      border-color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel input-panel">
      <h1>ESC/POS HEX Input</h1>
      <textarea id="hexInput" placeholder="Enter ESC/POS HEX data...&#10;&#10;Example:&#10;1B401B610148656C6C6F0A&#10;&#10;Supported formats:&#10;- Plain HEX: 1B401B6101&#10;- With spaces: 1B 40 1B 61 01&#10;- With 0x: 0x1B 0x40"></textarea>
      <div class="paper-select">
        <label for="paperWidth">Paper Width:</label>
        <select id="paperWidth">
          <option value="58mm" selected>58mm (384px)</option>
          <option value="57mm">57mm (378px)</option>
          <option value="80mm">80mm (576px)</option>
        </select>
      </div>
      <div class="controls">
        <button class="btn" id="previewBtn">Preview</button>
        <button class="btn clear-btn" id="clearBtn">Clear</button>
      </div>
      <div class="info">
        Supported commands: ESC @ (Initialize), ESC a n (Align), ESC E n (Bold), ESC - n (Underline), GS ! n (Font Size), LF (Newline), CR (Return), GS V m (Cut)
      </div>
      <div id="errorMessage" class="error" style="display: none;"></div>
    </div>

    <div class="panel preview-panel">
      <h1>Preview</h1>
      <div id="previewContainer">
        <div class="loading">Click preview to see result</div>
      </div>
    </div>
  </div>

  <script>
    const hexInput = document.getElementById('hexInput');
    const previewBtn = document.getElementById('previewBtn');
    const clearBtn = document.getElementById('clearBtn');
    const previewContainer = document.getElementById('previewContainer');
    const errorMessage = document.getElementById('errorMessage');
    const paperWidthSelect = document.getElementById('paperWidth');

    previewBtn.addEventListener('click', async () => {
      const hex = hexInput.value.trim();
      const paperWidth = paperWidthSelect.value;

      if (!hex) {
        showError('Please enter HEX data');
        return;
      }

      hideError();
      previewContainer.innerHTML = '<div class="loading">Parsing and rendering...</div>';
      previewBtn.disabled = true;

      try {
        const response = await fetch('/api/preview', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ hex, paperWidth })
        });

        if (!response.ok) {
          const result = await response.json();
          throw new Error(result.error || 'Request failed');
        }

        const result = await response.json();
        previewContainer.innerHTML = `<img id="previewImage" src="${result.dataUrl}" alt="Preview" />`;
      } catch (e) {
        showError(e.message);
        previewContainer.innerHTML = '<div class="loading">Preview failed</div>';
      } finally {
        previewBtn.disabled = false;
      }
    });

    clearBtn.addEventListener('click', () => {
      hexInput.value = '';
      previewContainer.innerHTML = '<div class="loading">Click preview to see result</div>';
      hideError();
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
    }

    function hideError() {
      errorMessage.style.display = 'none';
    }
  </script>
</body>
</html>
